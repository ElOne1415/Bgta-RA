<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiro Marker - Bogotá Verde AR</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .page {
      width: min(900px, 92vw);
      text-align: center;
      padding: 24px;
    }
    h1 {
      margin-bottom: 6px;
      color: #145a32;
    }
    p {
      margin-top: 0;
      color: #334155;
    }
    img {
      width: min(460px, 82vw);
      border: 18px solid #ffffff;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
    }
    .note {
      margin-top: 18px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Bogotá Verde AR Marker</h1>
    <p>Print this marker or show it on another screen. Then open index.html on your phone and scan it.</p>
    <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Hiro AR marker" />
    <p class="note">Keep the marker flat and well lit for better tracking.</p>
  </main>
</body>
</html>

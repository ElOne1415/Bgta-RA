<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hiro Marker - Bogotá Verde AR</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f8f7;font-family:system-ui,sans-serif;color:#102316}.wrap{width:min(92vw,760px);text-align:center}.marker{background:#fff;padding:26px;border-radius:18px;box-shadow:0 18px 60px #0002}.hiro{width:min(72vw,520px);aspect-ratio:1/1;margin:auto;background:#000;position:relative}.hiro:before{content:"";position:absolute;inset:25%;background:#fff}.hiro span{position:absolute;left:30%;right:30%;bottom:26%;font-size:min(13vw,110px);line-height:.8;font-weight:900;color:#000;text-align:left;z-index:2;letter-spacing:-.08em}.hiro:after{content:"";position:absolute;left:25%;top:25%;width:23%;height:23%;background:#fff;z-index:3}h1{margin:0 0 10px;font-size:clamp(30px,7vw,54px)}p{font-size:18px;line-height:1.4;color:#365041}.tip{font-weight:800;color:#0b5a37}</style>
</head>
<body>
  <main class="wrap">
    <h1>Hiro Marker</h1>
    <p>Open the AR experience on your phone. Keep this marker flat, complete, visible and well lit.</p>
    <section class="marker">
      <div class="hiro"><span>Hiro</span></div>
    </section>
    <p class="tip">Recommended distance: 30–60 cm from the phone camera.</p>
  </main>
</body>
</html>

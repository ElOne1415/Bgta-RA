<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiro Marker - Bogotá Verde AR</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f7f3; font-family: system-ui, sans-serif; color: #0a2f1d; }
    .page { width: min(900px, 96vw); text-align: center; padding: 24px; }
    h1 { margin-bottom: 8px; }
    p { color: #46564d; font-size: 18px; }
    .marker-wrap { margin: 22px auto; padding: 22px; background: white; border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.14); }
    img { width: min(680px, 86vw); display: block; margin: auto; image-rendering: auto; }
    .tip { font-weight: 800; color: #063d26; }
    @media print { body { background: white; } .marker-wrap { box-shadow: none; } p { display: none; } }
  </style>
</head>
<body>
  <main class="page">
    <h1>Hiro Marker</h1>
    <p>Show or print this marker. Open the AR experience on your phone and point the camera at this image.</p>
    <div class="marker-wrap">
      <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Official Hiro marker" />
    </div>
    <p class="tip">Keep it complete, flat, visible and well lit. Do not crop the black border.</p>
  </main>
</body>
</html>

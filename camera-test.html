<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Camera Test | Bogotá Verde AR</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #06160d; color: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: grid; place-items: center; padding: 18px; }
    main { width: min(760px, 100%); }
    video { width: 100%; max-height: 62vh; background: #000; border-radius: 22px; object-fit: cover; border: 1px solid rgba(255,255,255,.18); }
    .card { margin-top: 14px; padding: 16px; border-radius: 18px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.16); }
    button, a { display: inline-block; margin-top: 12px; border: 0; border-radius: 999px; padding: 12px 16px; font-weight: 800; background: #d9f99d; color: #052e1a; text-decoration: none; }
    p { line-height: 1.45; color: rgba(255,255,255,.82); }
    code { color: #d9f99d; }
  </style>
</head>
<body>
  <main>
    <video id="preview" autoplay muted playsinline webkit-playsinline></video>
    <section class="card">
      <h1>Camera Test</h1>
      <p id="status">Press the button to test if this browser can use the camera.</p>
      <button id="testBtn" type="button">Start camera test</button>
      <a href="index.html">Back to AR</a>
    </section>
  </main>
  <script>
    const statusEl = document.getElementById('status');
    const video = document.getElementById('preview');
    document.getElementById('testBtn').addEventListener('click', async () => {
      statusEl.textContent = 'Requesting camera permission...';
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('getUserMedia is not available. Use HTTPS and open this in Safari or Chrome, not inside another app.');
        }
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = 'Camera works in this browser. Go back to AR and scan the Hiro marker.';
      } catch (error) {
        statusEl.innerHTML = 'Camera failed: <code>' + error.message + '</code><br>Open the site directly in Safari/Chrome, use HTTPS, disable translation, and allow camera permission again.';
      }
    });
  </script>
</body>
</html>

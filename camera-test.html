<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Camera Test</title><style>body{margin:0;background:#000;color:white;font-family:system-ui}video{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover}button{position:fixed;z-index:2;left:20px;right:20px;bottom:30px;padding:16px;border:0;border-radius:16px;font-weight:900;background:#8ef26b;color:#062818}.msg{position:fixed;z-index:3;left:20px;right:20px;top:20px;background:#000a;padding:14px;border-radius:14px}</style></head><body><video id="v" autoplay muted playsinline webkit-playsinline></video><div id="m" class="msg">Camera test. Press start.</div><button id="b">Start camera test</button><script>b.onclick=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});v.srcObject=s;await v.play();m.textContent='Camera works. Return to index.html.'}catch(e){m.textContent='Error: '+e.message}}</script></body></html>

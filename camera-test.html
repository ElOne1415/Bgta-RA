<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Test</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#062d1d; color:white; font-family:system-ui,sans-serif; padding:20px; }
    .card { width:min(560px,100%); background:rgba(255,255,255,.1); padding:22px; border-radius:24px; }
    button { border:0; border-radius:16px; padding:14px 18px; font-weight:900; background:#ffd735; color:#09200f; }
    video { width:100%; border-radius:18px; margin-top:16px; background:#000; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Camera Test</h1>
    <p>This page only verifies if the browser can open the camera.</p>
    <button id="btn">Start camera test</button>
    <p id="msg"></p>
    <video id="video" autoplay playsinline muted></video>
  </div>
  <script>
    btn.onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        video.srcObject = stream;
        msg.textContent = "Camera works.";
      } catch (e) {
        msg.textContent = "Camera error: " + e.name + " - " + e.message;
      }
    };
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camera Test | Bogotá Verde AR</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: #020617; color: white; min-height: 100vh; display: grid; place-items: center; padding: 16px; }
    .card { width: min(720px, 100%); background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 24px; padding: 20px; }
    video { width: 100%; border-radius: 18px; background: #111827; min-height: 300px; object-fit: cover; }
    button { border: 0; border-radius: 999px; background: #bef264; color: #052e1d; padding: 14px 20px; font-weight: 900; margin: 12px 0; }
    p { color: rgba(255,255,255,.78); line-height: 1.45; }
    code { background: rgba(255,255,255,.1); padding: 2px 5px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Camera Test</h1>
    <p>This page checks only the camera permission. If this works but AR does not appear, the marker is the problem, not the camera.</p>
    <video id="video" playsinline autoplay muted></video>
    <button id="start">Start camera test</button>
    <p id="status">Waiting.</p>
  </main>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    document.getElementById('start').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
        video.srcObject = stream;
        status.textContent = 'Camera works. Now return to the AR page and use the official Hiro marker.';
      } catch (error) {
        status.textContent = 'Camera error: ' + error.name + ' — ' + error.message + '. Use HTTPS, Safari/Chrome, and check browser permissions.';
      }
    });
  </script>
</body>
</html>
